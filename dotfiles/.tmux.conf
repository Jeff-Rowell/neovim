set-option -g status-bg "#36454F"
bind-key -r M-s run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r M-h run-shell "tmux neww tmux-sessionizer -s 0"
bind-key -r M-j run-shell "tmux neww tmux-sessionizer -s 1"
bind-key -r M-k run-shell "tmux neww tmux-sessionizer -s 2"
bind-key -r M-l run-shell "tmux neww tmux-sessionizer -s 3"
bind-key -r M-n run-shell "tmux neww tmux-sessionizer -s 4"

set -g pane-border-style "fg=#6e6a86,bg=#000000"
set -g pane-active-border-style "fg=#3e8fb0,bg=#000000"
set -g pane-border-lines single
set -g pane-border-status off
set -g pane-border-format ""

set -g window-active-style "bg=#000000"
set -g window-style "bg=#0e0e0e"
